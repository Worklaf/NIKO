  <script>
let accessHashes = null;

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function loadAccessHashes() {
  const doc = await db.collection('config').doc('access').get();
  accessHashes = doc.exists ? doc.data() : {};
}
function getRole() { return localStorage.getItem('siteRole') || 'guest'; }
function setRole(r) { localStorage.setItem('siteRole', r); }
function logoutRole() { localStorage.removeItem('siteRole'); location.reload(); }

let isAdmin = getRole() === 'admin';
let isPartner = getRole() === 'partner';

async function loadUploadPermission() {
  const doc = await db.collection('config').doc('upload_permission').get();
  return doc.exists ? doc.data().value : 'admin_only';
}

if (isAdmin) {
  const sel = document.getElementById('upload-permission-select');
  if (sel) {
    sel.style.display = 'inline-block';
    loadUploadPermission().then(v => sel.value = v);
    sel.addEventListener('change', async () => {
      await db.collection('config').doc('upload_permission').set({ value: sel.value });
    });
  }
}
  
  
  let globalCounts = {};
  
  const getCount = k => {
    if (globalCounts[k] !== undefined) return globalCounts[k];
    return parseInt(localStorage.getItem(k) || '0', 10);
  };
  const setCount = (k,v) => {
    globalCounts[k] = v;
    localStorage.setItem(k, String(v));
  };

  let globalTracks = [];
  let isShuffleMode = localStorage.getItem('shuffleMode') === 'true';
  let globalPlaylists = [];

function isVisibleToRole(item, role) {
  if (item.visibility === 'hidden') return role === 'admin';
  if (item.visibility === 'partner') return role === 'admin' || role === 'partner';
  return true; // public
}

function renderPlaylistsList() {
  const list = document.getElementById('playlists-list');
  if (!list) return;
  const mine = globalPlaylists.filter(p => p.ownerRole === getRole());   // ← фильтр
  list.innerHTML = mine.map(p => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:6px">
      <span>${p.name} <small style="color:var(--muted)">(${p.visibility})</small></span>
      <button class="btn icon delete-playlist-btn" data-id="${p.id}">🗑️</button>
    </div>
  `).join('');
  list.querySelectorAll('.delete-playlist-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (confirm(t('deletePlaylistConfirm'))) {
        await db.collection('playlists').doc(btn.dataset.id).delete();
      }
    });
  });
}

function subscribePlaylists() {
  db.collection('playlists').orderBy('createdAt', 'asc').onSnapshot(snap => {
    globalPlaylists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPlaylistsList();
    renderDraftTracks(globalTracks);
  });
}

function subscribeTracks() {
  if (!db) return console.warn('Firestore not initialized');
  db.collection('tracks').orderBy('createdAt', 'desc').onSnapshot(snap => {
    const role = getRole();
    globalTracks = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(track => {
        if (!isVisibleToRole(track, role)) return false;
        if (track.playlistId) {
          const pl = globalPlaylists.find(p => p.id === track.playlistId);
          if (pl && !isVisibleToRole(pl, role)) return false;
        }
        return true;
      });
    renderDraftTracks(globalTracks);
  }, err => {
    console.warn('tracks snapshot error', err);
  });
}

 async function uploadToWorker(file, folder, fileName) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('fileName', fileName);
  fd.append('folder', folder);
  const res = await fetch(WORKER_URL + '/upload', { method: 'POST', body: fd });
  if (!res.ok) throw new Error('Upload failed: ' + res.status);
  const data = await res.json();
  return data.url;
}

async function deleteFromWorker(folder, fileName) {
  await fetch(WORKER_URL + '/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ folder, fileName })
  });
}

function sanitizeBaseName(title) {
  return title
    .trim()
    .replace(/[\/\\?%*:|"<>]/g, '_')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '');
}

function uniqueBaseName(candidate) {
  const existing = new Set(globalTracks.map(t => t.baseName));
  if (!existing.has(candidate)) return candidate;
  let i = 1;
  while (existing.has(`${candidate}_${i}`)) i++;
  return `${candidate}_${i}`;
}

async function loadCommentsFromServer(trackId) {
  const snap = await db.collection('tracks').doc(trackId)
    .collection('comments').orderBy('timestamp', 'asc').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function deleteCommentFromServer(trackId, commentId) {

  function setupSidePanelSwipe() {
    const sidePanel = document.getElementById('side-panel');
    let touchStartX = 0;
    let touchEndX = 0;

    // Удаляем предыдущие обработчики если есть
    const oldHandler = sidePanel.getAttribute('data-swipe-handler');
    if (oldHandler) {
      sidePanel.removeEventListener('touchstart', window[oldHandler].start);
      sidePanel.removeEventListener('touchend', window[oldHandler].end);
    }

    const startHandler = (e) => {
      touchStartX = e.changedTouches[0].screenX;
    };

    const endHandler = (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const swipeThreshold = 50;
      const diff = touchEndX - touchStartX;

      // Свайп слева направо - закрыть панель
      if (diff > swipeThreshold) {
        document.getElementById('side-panel').classList.remove('open');
        document.getElementById('side-content').style.display = 'block';
        document.getElementById('side-content-editor').style.display = 'none';
        document.getElementById('edit-mode-actions').classList.remove('active');
      }
    };

    sidePanel.addEventListener('touchstart', startHandler, { passive: true });
    sidePanel.addEventListener('touchend', endHandler, { passive: true });

    // Сохраняем ссылки для последующего удаления
    const handlerId = 'swipeHandler_' + Date.now();
    window[handlerId] = { start: startHandler, end: endHandler };
    sidePanel.setAttribute('data-swipe-handler', handlerId);
  }

    const isOwnerPartner = (p.ownerRole === 'partner');

    // partner может добавлять/удалять только в свои плейлисты
    let canAdd = false;

      canAdd = true;
      canRemove = true;
    }

    if (role === 'guest') {
      canAdd = false;
      canRemove = false;
    }

    const showPlus = (!isInPlaylist && canAdd);
    const showMinus = (isInPlaylist && canRemove);

    const visIcon = p.visibility === 'public' ? '🌍' :
                    p.visibility === 'partner' ? '♥' : '🔒';

      ${showPlus || showMinus ? `
        <button class="playlist-action-btn"
          style="
            background:${showMinus ? '#ff4da6' : '#4dff8a'};
            border:none;
            width:26px;
            height:26px;
            border-radius:6px;
            font-weight:900;
            cursor:pointer;
          ">
          ${showMinus ? '−' : '+'}
        </button>
      ` : ''}
    `;

      btn.addEventListener('click', async (e) => {
        e.stopPropagation();

        const playlistRef = db.collection('playlists').doc(p.id);

        // --- УДАЛЕНИЕ ---
        if (isInPlaylist) {
          if (!canRemove) {
            alert('You cannot remove tracks from this playlist.');
            return;
          }

          await db.collection('tracks').doc(trackId).update({
            playlistIds: firebase.firestore.FieldValue.arrayRemove(p.id)
          });

          await playlistRef.update({
            songCount: firebase.firestore.FieldValue.increment(-1)
          });
        }

        // --- ДОБАВЛЕНИЕ ---
        else {
          if (!canAdd) {
            alert('You cannot add tracks to this playlist.');
            return;
          }

          await db.collection('tracks').doc(trackId).update({
            playlistIds: firebase.firestore.FieldValue.arrayUnion(p.id)
          });

          await playlistRef.update({
            songCount: firebase.firestore.FieldValue.increment(1)
          });

          // если нет обложки — ставим обложку трека
          const playlistSnap = await playlistRef.get();

          if (!playlistData.cover && track?.cover) {
            await playlistRef.update({
              cover: track.cover,
              coverFileName: track.coverFileName
            });
          }
        }

        // обновляем глобальные данные

      });

  }); // КОНЕЦ ПЕРВОГО DOMContentLoaded

// 🔄 СБРОС СТАТИСТИКИ (ADMIN)
// ========================================

function getResetType() {
  return document.querySelector('input[name="reset-type"]:checked')?.value || 'plays';
}

function loadPlaysForReset() {
  const container = document.getElementById('plays-tracks-list');
  if (!container) return;
  
  const resetType = getResetType();
  
  container.innerHTML = '';
  
  if (globalTracks.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#bfc3d6;padding:20px">No tracks</p>';
    return;
  }
  
  globalTracks.forEach((track) => {
    let count, icon, label;
    
    if (resetType === 'plays') {
      count = track.plays || 0;
      icon = '🎵';
      label = 'plays';
    } else if (resetType === 'likes') {
      count = track.likes || 0;
      icon = '❤️';
      label = 'likes';
    } else {
      count = track.dislikes || 0;
      icon = '💔';
      label = 'dislikes';
    }
    
    const div = document.createElement('div');
    div.style.cssText = 'padding: 8px; margin-bottom: 6px; background: rgba(255,255,255,0.05); border-radius: 8px';
    
    div.innerHTML = `
      <label style="display: flex; align-items: center; gap: 10px; cursor: pointer">
        <input type="checkbox" class="play-checkbox" data-src="${track.audio}" style="width: 16px; height: 16px">
        <img src="${track.cover}" style="width: 40px; height: 60px; object-fit: cover; border-radius: 4px" alt="">
        <div style="flex: 1; min-width: 0">
          <div style="font-weight: 600; color: #fff; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap">
            ${track.title}
          </div>
          <div style="color: #bfc3d6; font-size: 12px">
            ${icon} ${count} ${label}
          </div>
        </div>
      </label>
    `;
    
    container.appendChild(div);
  });
}

function openResetPlaysModal() {
  document.getElementById('reset-plays-modal').classList.add('open');
  loadPlaysForReset();
  document.getElementById('select-all-plays').checked = false;
}

async function resetPlaysCounters() {
  const resetType = getResetType();
  const selected = Array.from(document.querySelectorAll('.play-checkbox:checked'))
    .map(cb => cb.dataset.src);
  
  if (selected.length === 0) {
    alert('❌ Select at least one track!');
    return;
  }

  const typeLabels = {
    plays: 'PLAYS',
    likes: 'LIKES',
    dislikes: 'DISLIKES'
  };

  const confirmed = window.confirm(
    `⚠️ RESET ${typeLabels[resetType]}?\n\n` +
    `${selected.length} track(s) will have ${typeLabels[resetType].toLowerCase()} reset to 0.\n\n` +
    `This cannot be undone!\n\n` +
    `Continue?`
  );

  if (!confirmed) return;

  const btn = document.getElementById('reset-plays-confirm');
  btn.textContent = '⏳ Resetting...';
  btn.disabled = true;

  for (const src of selected) {
    const track = globalTracks.find(t => t.audio === src);
    if (!track) continue;
    await db.collection('tracks').doc(track.id).update({ [resetType]: 0 });
  }

  btn.textContent = '🗑️ Reset';
  btn.disabled = false;

  document.getElementById('reset-plays-modal').classList.remove('open');

  alert(`✅ Done!\n\n${selected.length} track(s) ${typeLabels[resetType].toLowerCase()} reset to 0`);
}

document.addEventListener('DOMContentLoaded', function() {

  if (isAdmin) {
    document.getElementById('resetPlaysBtn')?.addEventListener('click', openResetPlaysModal);

    document.getElementById('reset-plays-cancel')?.addEventListener('click', () => {
      document.getElementById('reset-plays-modal').classList.remove('open');
    });

    document.getElementById('reset-plays-confirm')?.addEventListener('click', resetPlaysCounters);

    document.getElementById('select-all-plays')?.addEventListener('change', (e) => {
      document.querySelectorAll('.play-checkbox').forEach(cb => cb.checked = e.target.checked);
    });

    document.querySelectorAll('input[name="reset-type"]').forEach(radio => {
      radio.addEventListener('change', () => {
        loadPlaysForReset();
        document.getElementById('select-all-plays').checked = false;
      });
    });

  } else {
    const btn = document.getElementById('resetPlaysBtn');
    if (btn) btn.style.display = 'none';
  }

  const loginBtn = document.getElementById('loginBtn');

  function refreshLoginBtn() {
    const r = getRole();
    const logo = document.getElementById('site-logo');
    if (logo) {
      if (r === 'admin' || r === 'partner') logo.classList.add('clickable');
      else logo.classList.remove('clickable');
    }
    loginBtn.innerHTML = '';
    loginBtn.style.background = 'transparent';
    loginBtn.style.border = 'none';
    loginBtn.style.padding = '0';
    loginBtn.style.width = 'auto';
    loginBtn.style.height = 'auto';

    const img = document.createElement('img');
    img.style.width = '100%';
    img.style.height = 'auto';
    img.style.maxWidth = '120px';
    img.style.display = 'block';

    if (r === 'admin' || r === 'partner') {
      img.src = 'https://pub-6f797b2842b7491297940c7f3f51e92f.r2.dev/NIKO_music/Logout.png';
    } else {
      img.src = 'https://pub-6f797b2842b7491297940c7f3f51e92f.r2.dev/NIKO_music/Login.png';
    }

    loginBtn.appendChild(img);

    const addTrackBtn = document.getElementById('addTrackBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const resetPlaysBtn = document.getElementById('resetPlaysBtn');
    const managePlaylistsBtn = document.getElementById('managePlaylistsBtn');
    const filterMyTracksBtn = document.getElementById('filterMyTracksBtn');

    if (addTrackBtn) {
      addTrackBtn.style.display = (r === 'admin' || r === 'partner') ? 'inline-block' : 'none';
      // Меняем текст кнопки для партнера
      if (r === 'partner') {
        addTrackBtn.querySelector('span').setAttribute('data-i18n', 'uploadPartnerTrack');
      } else {
        addTrackBtn.querySelector('span').setAttribute('data-i18n', 'uploadTrack');
      }
    }
if (exportJsonBtn) exportJsonBtn.style.display = r === 'admin' ? 'inline-block' : 'none';
if (resetPlaysBtn) resetPlaysBtn.style.display = r === 'admin' ? 'inline-block' : 'none';
if (managePlaylistsBtn) managePlaylistsBtn.style.display = 'inline-block';
if (filterMyTracksBtn) filterMyTracksBtn.style.display = (r === 'admin' || r === 'partner') ? 'inline-block' : 'none';


  }

  async function exportToJson() {
    try {
      const btn = document.getElementById('exportJsonBtn');
      btn.textContent = '⏳ Exporting...';
      btn.disabled = true;

      const snapshot = await db.collection('tracks').get();
      const tracks = [];

      snapshot.forEach(doc => {
        tracks.push({ id: doc.id, ...doc.data() });
      });

      const jsonData = JSON.stringify(tracks, null, 2);
      const blob = new Blob([jsonData], { type: 'application/json' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `tracks_backup_${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      alert(`✅ ${tracks.length} ${t('tracks')} ${t('exported')}`);
    } catch (error) {
      alert('❌ Ошибка экспорта: ' + error.message);
    } finally {
      const btn = document.getElementById('exportJsonBtn');
      btn.textContent = '📦 Export JSON';
      btn.disabled = false;
    }
  }

  document.getElementById('exportJsonBtn')?.addEventListener('click', exportToJson);

  refreshLoginBtn();

  loginBtn.addEventListener('click', () => {
    if (getRole() !== 'guest') {
      logoutRole();
      return;
    }
    document.getElementById('login-modal').classList.add('open');
  });

  document.getElementById('login-cancel').addEventListener('click', () => {
    document.getElementById('login-modal').classList.remove('open');
    enteredPin = '';
    updatePinDisplay();
  });

  let enteredPin = '';
  const pinDisplay = document.getElementById('pin-display');
  const loginModal = document.getElementById('login-modal');

  function updatePinDisplay() {
    if (enteredPin.length === 0) {
      pinDisplay.textContent = '••••';
    } else {
      pinDisplay.textContent = enteredPin.padEnd(4, '•');
    }
  }

  function flashError() {
    loginModal.style.animation = 'none';
    loginModal.offsetHeight;
    loginModal.style.animation = 'flashRed 0.5s ease';
  }

  document.querySelectorAll('.pin-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const digit = btn.dataset.digit;
      const action = btn.dataset.action;

      if (digit !== undefined) {
        enteredPin += digit;
        updatePinDisplay();
      } else if (action === 'clear') {
        enteredPin = '';
        updatePinDisplay();
      } else if (action === 'confirm') {

        if (enteredPin.length === 0) return;

        const hash = await sha256(enteredPin);
        const role =
          hash === accessHashes?.adminHash ? 'admin' :
          hash === accessHashes?.partnerHash ? 'partner' :
          null;

        if (role) {
          setRole(role);
          enteredPin = '';
          updatePinDisplay();
          document.getElementById('login-modal').classList.remove('open');
          location.reload();
        } else {
          flashError();
          enteredPin = '';
          updatePinDisplay();
        }
      }
    });
  });

});

/* Обновление UI иконок play/pause без полного перерендера */
window.updateTrackPlayIcons = function() {
  const currentId = window.currentTrackId || null;
  const isPlaying = window.isPlaying || false;

  document.querySelectorAll('.track').forEach(el => {
    const id = el.dataset.id;
    const playBtn = el.querySelector('.play-btn');
    if (!playBtn) return;

    if (id === currentId) {
      el.classList.add('playing');
      playBtn.classList.add('playing');
      playBtn.innerHTML = isPlaying
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l15-9L5 3z"/></svg>';
    } else {
      el.classList.remove('playing');
      playBtn.classList.remove('playing');
      playBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l15-9L5 3z"/></svg>';
    }
  });
};
